<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX in browser -->

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            DEFAULT: '#d4af37',
                            light: '#f9e29d',
                        },
                        dark: {
                            DEFAULT: '#0a0a0a',
                            soft: '#1a1a1a',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse-slow 8s ease-in-out infinite',
                    },
                    keyframes: {
                        'pulse-slow': {
                            '0%, 100%': { opacity: 0.5, transform: 'scale(1.05)' },
                            '50%': { opacity: 0.7, transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            html {
                scroll-behavior: smooth;
            }
            body {
                @apply bg-dark text-white font-sans;
            }
        }

        @layer utilities {
            .gold-gradient {
                background: linear-gradient(135deg, #d4af37 0%, #f9e29d 50%, #d4af37 100%);
            }
            .text-gold-gradient {
                background: linear-gradient(135deg, #d4af37 0%, #f9e29d 50%, #d4af37 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }
            .glass-card {
                background-color: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

            {
                id: 'pre-wedding',

                description: 'Romantic storytelling before the big day.',
                image: 'https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=800',
            },
            {
                id: 'post-wedding',
                title: 'Post Wedding Photography',
                description: 'Beautiful portraits after the celebrations.',
                image: 'https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&q=80&w=800',

            {

            {

            {

                image: 'https://images.unsplash.com/photo-1551446591-142875a901a1?auto=format&fit=crop&q=80&w=800',

            {
                id: 'corporate',
                title: 'Corporate Events',
                description: 'Professional coverage for your business milestones.',
                image: 'https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&q=80&w=800',
            },
        ];

        const GALLERY = [
            { id: 'df-1', category: 'Wedding', title: 'Sacred Union', image: 'https://ais-dev-4lgt4ctdxqoitvr7nup4eq-420153344696.asia-southeast1.run.app/api/attachments/97960333-6623-4e80-8772-230b0507207a' },
            { id: 'df-2', category: 'Wedding', title: 'Henna Art', image: 'https://ais-dev-4lgt4ctdxqoitvr7nup4eq-420153344696.asia-southeast1.run.app/api/attachments/5f24f575-470a-4416-8c46-88092289650b' },
            { id: 'df-3', category: 'Wedding', title: 'Traditional Grace', image: 'https://ais-dev-4lgt4ctdxqoitvr7nup4eq-420153344696.asia-southeast1.run.app/api/attachments/c0901e1a-1d7c-4034-8025-635b756191c0' },
            { id: 'df-4', category: 'Wedding', title: 'Celebration Collage', image: 'https://ais-dev-4lgt4ctdxqoitvr7nup4eq-420153344696.asia-southeast1.run.app/api/attachments/5551341c-3220-4318-8686-3023812739f4' },
            { id: 'df-5', category: 'Wedding', title: 'Radiant Smile', image: 'https://ais-dev-4lgt4ctdxqoitvr7nup4eq-420153344696.asia-southeast1.run.app/api/attachments/3a38e88e-670d-4584-b026-6f455e9664e4' },
            { id: 'nep-1', category: 'Wedding', title: 'Sindoor Ceremony', image: 'https://images.unsplash.com/photo-1604017011826-d3b4c23f8914?auto=format&fit=crop&q=80&w=800' },

            { id: 'nep-5', category: 'Wedding', title: 'Bridal Elegance', image: 'https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=800' },
            { id: 'nep-6', category: 'Wedding', title: 'Sacred Fire', image: 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80&w=800' },
            { id: '1', category: 'Wedding', title: 'Eternal Love', image: 'https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&q=80&w=800' },
            { id: '2', category: 'Baby', title: 'Little Wonder', image: 'https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&q=80&w=800' },
            { id: '3', category: 'Maternity', title: 'New Life', image: 'https://images.unsplash.com/photo-1551446591-142875a901a1?auto=format&fit=crop&q=80&w=800' },
        ];

        // Icon Components
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [activeCategory, setActiveCategory] = useState('All');

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const categories = useMemo(() => ['All', ...Array.from(new Set(GALLERY.map(item => item.category)))], []);
            const filteredGallery = activeCategory === 'All' 
                ? GALLERY 
                : GALLERY.filter(item => item.category === activeCategory);

            const navLinks = [
                { name: 'Home', href: '#home' },
                { name: 'About', href: '#about' },
                { name: 'Services', href: '#services' },
                { name: 'Portfolio', href: '#portfolio' },
                { name: 'Booking', href: '#booking' },
                { name: 'Contact', href: '#contact' },
            ];

            return (
                <div className="min-h-screen bg-dark text-white selection:bg-gold selection:text-dark">
                    {/* Navigation */}
                    <nav className={cn(
                        "fixed top-0 left-0 right-0 z-50 transition-all duration-300 px-6 py-4",
                        isScrolled ? "bg-dark/90 backdrop-blur-lg shadow-xl py-3" : "bg-transparent"
                    )}>

                                        className="h-full w-auto object-contain"
                                    />
                                </div>
                                <span className="text-xl font-serif font-bold tracking-wider hidden sm:inline-block">
                                    DREAMFRAME <span className="text-gold">STUDIO</span>
                                </span>
                            </a>

                            {/* Desktop Nav */}
                            <div className="hidden md:flex items-center gap-8">
                                {navLinks.map((link) => (
                                    <a 
                                        key={link.name} 
                                        href={link.href}
                                        className="text-sm font-medium hover:text-gold transition-colors tracking-widest uppercase"
                                    >
                                        {link.name}
                                    </a>
                                ))}
                                <a 
                                    href="#booking" 
                                    className="px-6 py-2 bg-gold text-dark font-bold rounded-full hover:bg-gold-light transition-colors text-sm uppercase tracking-tighter"
                                >
                                    Book Now
                                </a>
                            </div>

                            {/* Mobile Menu Toggle */}
                            <button 
                                className="md:hidden text-white"
                                onClick={() => setIsMenuOpen(!isMenuOpen)}
                            >
                                {isMenuOpen ? <Icon name="x" /> : <Icon name="menu" />}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-dark pt-24 px-6 md:hidden">
                            <div className="flex flex-col gap-6 text-center">
                                {navLinks.map((link) => (
                                    <a 
                                        key={link.name} 
                                        href={link.href}
                                        onClick={() => setIsMenuOpen(false)}
                                        className="text-2xl font-serif hover:text-gold transition-colors"
                                    >
                                        {link.name}
                                    </a>
                                ))}
                                <a 
                                    href="#booking" 
                                    onClick={() => setIsMenuOpen(false)}
                                    className="mt-4 px-8 py-4 bg-gold text-dark font-bold rounded-full text-xl"
                                >
                                    Book Your Date
                                </a>
                            </div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <section id="home" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920" 
                                alt="Wedding Photography" 
                                className="w-full h-full object-cover opacity-50 scale-105 animate-pulse-slow"
                            />
                            <div className="absolute inset-0 bg-gradient-to-b from-dark/60 via-transparent to-dark"></div>
                        </div>

                        <div className="relative z-10 text-center px-6 max-w-4xl">
                            <div>
                                <span className="inline-block px-4 py-1 border border-gold text-gold text-xs tracking-[0.3em] uppercase mb-6 rounded-full">
                                    Professional Photography & Videography
                                </span>
                                <h1 className="text-5xl md:text-8xl font-serif font-bold mb-6 leading-tight">

                                    <span className="text-gold-gradient italic">Precious Moments</span> Forever
                                </h1>
                                <p className="text-lg md:text-xl text-white/70 mb-10 max-w-2xl mx-auto font-light leading-relaxed">

                                    DreamFrame Studio brings cinematic excellence to your life's most beautiful events.
                                </p>
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                    <a 
                                        href="#booking" 
                                        className="group px-8 py-4 bg-gold text-dark font-bold rounded-full hover:bg-gold-light transition-all flex items-center gap-2 transform hover:scale-105"
                                    >
                                        Book Your Date Now
                                        <Icon name="chevron-right" className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                                    </a>
                                    <a 
                                        href="#portfolio" 
                                        className="px-8 py-4 border border-white/20 hover:border-gold transition-colors rounded-full font-medium"
                                    >
                                        View Portfolio
                                    </a>
                                </div>
                            </div>
                        </div>

                        {/* Scroll Indicator */}
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-50 animate-bounce">
                            <span className="text-[10px] uppercase tracking-[0.2em]">Scroll</span>
                            <div className="w-[1px] h-12 bg-gradient-to-b from-gold to-transparent"></div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-24 px-6 bg-dark-soft relative overflow-hidden">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
                            <div className="relative">
                                <div className="aspect-[4/5] rounded-2xl overflow-hidden border-2 border-gold/20">
                                    <img 
                                        src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&q=80&w=800" 
                                        alt="Photographer at work" 
                                        className="w-full h-full object-cover"
                                    />
                                </div>
                                <div className="absolute -bottom-8 -right-8 w-48 h-48 bg-gold rounded-2xl p-6 flex flex-col justify-center shadow-2xl hidden lg:flex">

                                    </p>
                                    <p>
                                        Specializing in wedding and event coverage, we blend traditional values with modern cinematic

                                            <p className="text-xs text-white/50">Top-tier equipment and skills.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="services" className="py-24 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <span className="text-gold font-bold tracking-widest uppercase text-sm">Our Expertise</span>
                                <h2 className="text-4xl md:text-5xl font-serif font-bold mt-4">Services We Offer</h2>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {SERVICES.map((service, index) => (
                                    <div 
                                        key={service.id}
                                        className="group relative overflow-hidden rounded-2xl glass-card"
                                    >
                                        <div className="aspect-video overflow-hidden">
                                            <img 
                                                src={service.image} 
                                                alt={service.title} 
                                                className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                            />
                                        </div>
                                        <div className="p-6">
                                            <h3 className="text-xl font-serif font-bold mb-2 group-hover:text-gold transition-colors">

                                                {service.description}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Portfolio Section */}
                    <section id="portfolio" className="py-24 px-6 bg-dark-soft">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                                <div>
                                    <span className="text-gold font-bold tracking-widest uppercase text-sm">Our Work</span>
                                    <h2 className="text-4xl md:text-5xl font-serif font-bold mt-4">Visual Masterpieces</h2>
                                </div>
                                
                                <div className="flex flex-wrap gap-4">
                                    {categories.map(cat => (
                                        <button
                                            key={cat}
                                            onClick={() => setActiveCategory(cat)}
                                            className={cn(
                                                "px-6 py-2 rounded-full text-sm font-medium transition-all",
                                                activeCategory === cat 
                                                    ? "bg-gold text-dark" 
                                                    : "border border-white/10 hover:border-gold/50"
                                            )}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredGallery.map((item) => (
                                    <div
                                        key={item.id}
                                        className="group relative aspect-square overflow-hidden rounded-2xl"
                                    >
                                        <img 
                                            src={item.image} 
                                            alt={item.title} 
                                            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-dark via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-8">
                                            <span className="text-gold text-xs font-bold uppercase tracking-widest mb-2">{item.category}</span>
                                            <h4 className="text-2xl font-serif font-bold">{item.title}</h4>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Booking Section */}
                    <section id="booking" className="py-24 px-6 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-gold rounded-full blur-[120px]"></div>
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-gold rounded-full blur-[120px]"></div>
                        </div>

                        <div className="max-w-4xl mx-auto relative z-10">
                            <div className="text-center mb-16">
                                <span className="text-gold font-bold tracking-widest uppercase text-sm">Reservation</span>
                                <h2 className="text-4xl md:text-5xl font-serif font-bold mt-4">Book Your Date Now</h2>
                                <p className="text-white/60 mt-4">Fill out the form below and we'll get back to you shortly.</p>
                            </div>

                            <form className="grid grid-cols-1 md:grid-cols-2 gap-6 glass-card p-8 md:p-12 rounded-3xl" onSubmit={(e) => e.preventDefault()}>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold uppercase tracking-widest text-gold">Full Name</label>
                                    <div className="relative">
                                        <Icon name="user" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/30" />
                                        <input 
                                            type="text" 
                                            placeholder="John Doe"
                                            className="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-gold transition-colors"
                                        />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold uppercase tracking-widest text-gold">Phone Number</label>
                                    <div className="relative">
                                        <Icon name="phone" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/30" />
                                        <input 
                                            type="tel" 
                                            placeholder="+977 980..."
                                            className="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-gold transition-colors"
                                        />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold uppercase tracking-widest text-gold">Email Address</label>
                                    <div className="relative">
                                        <Icon name="mail" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/30" />
                                        <input 
                                            type="email" 
                                            placeholder="example@mail.com"
                                            className="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-gold transition-colors"
